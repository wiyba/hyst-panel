mode: rule
log-level: info
dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8
  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fake-ip-filter:
    - '*.lan'
    - stun.*.*.*
    - stun.*.*
    - time.windows.com
    - time.nist.gov
    - pool.ntp.org
    - '*.msftconnecttest.com'
    - '*.msftncsi.com'
  ipv6: false
proxies:
{proxies}
proxy-groups:
  - name: LONDON
    type: select
    proxies:
      - 🇬🇧
  - name: STOCKHOLM
    type: select
    proxies:
      - 🇸🇪
rules:
  - GEOSITE,nixos,DIRECT
  - GEOSITE,steam,DIRECT
  - GEOSITE,category-gov-ru,DIRECT 
  - GEOIP,PRIVATE,DIRECT
  - DOMAIN-SUFFIX,wiyba.org,DIRECT
  - MATCH,STOCKHOLM
